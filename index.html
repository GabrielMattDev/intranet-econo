<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconoWeb - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1E40AF;
            --primary-light: #3B82F6;
            --primary-dark: #1E3A8A;
            --secondary: #059669;
            --accent: #EA580C;
            --danger: #DC2626;
            --dark: #0F172A;
            --gray: #64748B;
            --gray-light: #94A3B8;
            --gray-lighter: #CBD5E1;
            --bg: #F8FAFC;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 50%, #1E40AF 100%);
            position: relative;
            overflow: hidden;
        }

        /* Background Effects */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 60%);
            z-index: 0;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.3);
            animation: float 20s infinite ease-in-out;
            z-index: 0;
        }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 20%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(4) { width: 6px; height: 6px; top: 60%; left: 80%; animation-delay: -5s; background: rgba(16, 185, 129, 0.3); }
        .particle:nth-child(5) { width: 3px; height: 3px; top: 40%; left: 60%; animation-delay: -10s; background: rgba(124, 58, 237, 0.3); }
        .particle:nth-child(6) { width: 5px; height: 5px; top: 80%; left: 30%; animation-delay: -15s; background: rgba(234, 88, 12, 0.2); }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.6; }
            90% { opacity: 1; }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 180px;
            height: auto;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 13px;
            color: var(--gray);
            font-weight: 500;
            margin-top: 4px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            color: var(--dark);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-input::placeholder {
            color: var(--gray-light);
        }

        .form-input:focus {
            border-color: var(--primary-light);
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .form-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.08);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-light);
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-input:focus + .input-icon {
            color: var(--primary-light);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-light);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: all 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .error-message {
            display: none;
            font-size: 12px;
            color: var(--danger);
            margin-top: 6px;
            font-weight: 500;
            align-items: center;
            gap: 4px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message::before {
            content: '\f06a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 12px;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3);
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 64, 175, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Links */
        .links-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .link {
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .link-primary {
            color: var(--primary);
        }

        .link-primary:hover {
            color: var(--primary-dark);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Security Badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #ECFDF5, #D1FAE5);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--secondary);
        }

        .security-badge i {
            font-size: 14px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--gray-light);
            font-size: 13px;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* SSO Buttons */
        .sso-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sso-btn {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            color: var(--dark);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sso-btn:hover {
            background: var(--bg-hover);
            border-color: var(--gray-lighter);
            transform: translateY(-1px);
        }

        .sso-btn i {
            font-size: 18px;
        }

        /* Remember & Forgot */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--gray);
            font-weight: 500;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
                border-radius: 20px;
            }
            .logo-img {
                width: 150px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="grid-overlay"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo EconoWeb -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <img src="econoweb_logo.png" alt="EconoWeb" class="logo-img" onerror="this.style.display='none'">
                    <div class="tagline">Intranet Corporativa</div>
                </div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Usuário</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="username"
                            class="form-input"
                            placeholder="Digite seu usuário"
                            autocomplete="username"
                            required
                        >
                        <i class="fas fa-user input-icon"></i>
                    </div>
                    <div class="error-message" id="username-error">Usuário não encontrado</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Digite sua senha"
                            autocomplete="current-password"
                            required
                        >
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="error-message" id="password-error">Senha incorreta</div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="link link-primary" style="font-size: 13px;" onclick="alert('Contate o administrador do sistema para recuperar acesso.')">
                        Esqueci a senha
                    </a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-arrow-right"></i> Entrar na Intranet
                </button>
            </form>



            <!-- Security Badge -->
            <div class="security-badge">
                <i class="fas fa-shield-halved"></i>
                <span>Acesso restrito - Autenticação obrigatória</span>
            </div>
        </div>
    </div>

    <script>
        // ===== BANCO DE DADOS DE USUÁRIOS =====
        // Em produção, isso viria de um backend seguro
        const USERS = [
            { username: 'admin', password: 'Biel@1812', name: 'Administrador', role: 'admin' },
            { username: 'gabriel.matos', password: 'Econo@2024', name: 'Gabriel Matos', role: 'user' },
            { username: 'maria.silva', password: 'Econo@2024', name: 'Maria Silva', role: 'user' },
            { username: 'joao.pereira', password: 'Econo@2024', name: 'João Pereira', role: 'user' },
            { username: 'ana.costa', password: 'Econo@2024', name: 'Ana Costa', role: 'user' },
            { username: 'pedro.santos', password: 'Econo@2024', name: 'Pedro Santos', role: 'user' },
            { username: 'lucia.oliveira', password: 'Econo@2024', name: 'Lúcia Oliveira', role: 'user' },
            { username: 'carlos.mendes', password: 'Econo@2024', name: 'Carlos Mendes', role: 'user' },
            { username: 'fernanda.lima', password: 'Econo@2024', name: 'Fernanda Lima', role: 'user' },
            { username: 'ricardo. Souza', password: 'Econo@2024', name: 'Ricardo Souza', role: 'user' }
        ];

        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.classList.toggle('fa-eye');
            toggleIcon.classList.toggle('fa-eye-slash');
        });

        // Form submission
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const usernameError = document.getElementById('username-error');
        const passwordError = document.getElementById('password-error');
        const usernameInput = document.getElementById('username');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // Reset errors
            usernameError.classList.remove('show');
            passwordError.classList.remove('show');
            usernameInput.classList.remove('error');
            passwordInput.classList.remove('error');

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            let hasError = false;

            if (!username) {
                usernameError.textContent = 'Digite seu usuário';
                usernameError.classList.add('show');
                usernameInput.classList.add('error');
                hasError = true;
            }

            if (!password) {
                passwordError.textContent = 'Digite sua senha';
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
                hasError = true;
            }

            if (hasError) {
                loginForm.classList.add('shake');
                setTimeout(() => loginForm.classList.remove('shake'), 400);
                return;
            }

            // Simulate loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div> Verificando credenciais...';

            setTimeout(() => {
                // AUTHENTICATION CHECK
                const user = USERS.find(u => u.username === username && u.password === password);

                if (!user) {
                    // Check if username exists
                    const userExists = USERS.find(u => u.username === username);
                    if (userExists) {
                        passwordError.textContent = 'Senha incorreta';
                        passwordError.classList.add('show');
                        passwordInput.classList.add('error');
                    } else {
                        usernameError.textContent = 'Usuário não cadastrado';
                        usernameError.classList.add('show');
                        usernameInput.classList.add('error');
                    }

                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Entrar na Intranet';
                    loginForm.classList.add('shake');
                    setTimeout(() => loginForm.classList.remove('shake'), 400);
                    return;
                }

                // SUCCESS - Store session and redirect
                const sessionData = {
                    username: user.username,
                    name: user.name,
                    role: user.role,
                    loginTime: new Date().toISOString()
                };

                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('econoweb_session', JSON.stringify(sessionData));
                } else {
                    sessionStorage.setItem('econoweb_session', JSON.stringify(sessionData));
                }

                loginBtn.innerHTML = '<i class="fas fa-check"></i> Acesso autorizado!';
                loginBtn.style.background = 'linear-gradient(135deg, #059669, #10B981)';

                setTimeout(() => {
                    window.location.href = 'dash.html';
                }, 800);
            }, 1200);
        });

        // Clear errors on input
        usernameInput.addEventListener('input', () => {
            usernameError.classList.remove('show');
            usernameInput.classList.remove('error');
        });

        passwordInput.addEventListener('input', () => {
            passwordError.classList.remove('show');
            passwordInput.classList.remove('error');
        });

        // Check existing session
        const existingSession = localStorage.getItem('econoweb_session') || sessionStorage.getItem('econoweb_session');
        if (existingSession) {
            try {
                const session = JSON.parse(existingSession);
                const loginTime = new Date(session.loginTime);
                const now = new Date();
                const hoursDiff = (now - loginTime) / (1000 * 60 * 60);

                // Auto-redirect if session is less than 24 hours
                if (hoursDiff < 24) {
                    window.location.href = 'dash.html';
                }
            } catch (e) {
                localStorage.removeItem('econoweb_session');
                sessionStorage.removeItem('econoweb_session');
            }
        }
    </script>
</body>
</html>
